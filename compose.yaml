services:
  postgres:
    image: "docker.io/library/postgres:18"
    ports:
     - "5432:5432/tcp"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chdrms
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
