name: Backend

on:
  push:
    branches: [main]
    paths:
      - '.sqlx/**'
      - 'backend/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
  pull_request:
    paths:
      - '.sqlx/**'
      - 'backend/**'
      - 'Cargo.lock'
      - 'Cargo.toml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install rustfmt and Clippy
        run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check
      #- run: cargo clippy --locked --workspace --all-targets

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: ikalnytskyi/action-setup-postgres@v8
        id: postgres
        with:
          postgres-version: "18"
      - uses: rui314/setup-mold@v1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-build"
      - name: Run tests
        run: cargo test
        env:
          DATABASE_URL: ${{ steps.postgres.outputs.connection-uri }}
          SQLX_OFFLINE: true

  openapi:
    name: OpenAPI Schema
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: rui314/setup-mold@v1
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rust-build"
      - name: Generate OpenAPI schema
        run: cargo run --bin export_openapi openapi/schema.json
        env:
          SQLX_OFFLINE: true
      - name: Check diff
        run: git diff --exit-code openapi/schema.json
